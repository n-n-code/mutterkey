name: Release Checks

on:
  workflow_dispatch:
  push:
    # Run automatically for version-style release tags such as v1.0.0.
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-checks:
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve change contract range
        id: contract_range
        run: |
          if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "range=HEAD^..HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build and diagnostics dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            cmake \
            g++ \
            git \
            libc6-dbg \
            ninja-build \
            pkg-config \
            valgrind \
            libgl-dev \
            libopengl-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-multimedia-dev \
            libkf6globalaccel-dev \
            libkf6guiaddons-dev

      - name: Run release hygiene checks
        env:
          FRAME_CHANGE_CONTRACT_RANGE: ${{ steps.contract_range.outputs.range }}
        run: bash scripts/check-release-hygiene.sh

      - name: Run change contract checks
        env:
          FRAME_CHANGE_CONTRACT_RANGE: ${{ steps.contract_range.outputs.range }}
        run: bash scripts/check-change-contracts.sh

      - name: Configure debug build
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Validate install tree
        run: |
          INSTALL_DIR="$(mktemp -d)"
          cmake --install build --prefix "$INSTALL_DIR"
          test -x "$INSTALL_DIR/bin/mutterkey"
          test -x "$INSTALL_DIR/bin/mutterkey-tray"

      - name: Validate headless tray startup
        run: |
          if timeout 2s env QT_QPA_PLATFORM=offscreen ./build/mutterkey-tray; then
            exit 0
          else
            status=$?
            test "$status" -eq 124
          fi

      - name: Run Valgrind Memcheck lane
        run: bash scripts/run-valgrind.sh build
